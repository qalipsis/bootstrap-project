# Local mock backend for offline scenario development.
# Start:  docker compose up -d
# Stop:   docker compose down
#
# Then point your scenario at http://localhost:8080 instead of https://httpbin.org.
services:
  httpbin:
    image: kennethreitz/httpbin:latest
    container_name: qalipsis-bootstrap-httpbin
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost/status/200"]
      interval: 5s
      timeout: 3s
      retries: 5
