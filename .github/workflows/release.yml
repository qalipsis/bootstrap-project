name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & verify
        run: ./gradlew clean build qalipsisRunAllScenarios

      - name: Package distribution
        run: ./gradlew distZip

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        run: ./gradlew dockerPush

      - name: Publish to QALIPSIS Cloud
        # Only runs if the QALIPSIS_CLOUD_TOKEN secret is configured.
        if: ${{ secrets.QALIPSIS_CLOUD_TOKEN != '' }}
        run: ./gradlew qalipsisCloudPublish -Pqalipsis.cloud.registry.token=${{ secrets.QALIPSIS_CLOUD_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/distributions/*.zip
            build/libs/*-qalipsis.jar
          generate_release_notes: true
