name: Build & test scenarios

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to keep CI snappy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IN_GITHUB: true

jobs:
  build:
    name: Build (${{ matrix.os }} / JDK ${{ matrix.java }})
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java: ['11', '17', '21']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Set up Gradle (with cache + wrapper validation)
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew clean build

      - name: Run all scenarios
        # Smoke-test the example end-to-end so the bootstrap is always known-good.
        run: ./gradlew qalipsisRunAllScenarios

      - name: Upload distribution archive
        if: matrix.os == 'ubuntu-latest' && matrix.java == '11'
        uses: actions/upload-artifact@v4
        with:
          name: scenarios-dist
          path: build/distributions/*.zip
          if-no-files-found: warn
          retention-days: 7
